version: '3.8'
services:
  backend:
    build: ./backend
    container_name: backend-ci
    ports:
      - "3000:3000"
    networks:
      - red-ci

  frontend:
    build: ./frontend
    container_name: frontend-ci
    ports:
      - "8080:80"
    networks:
      - red-ci

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-ci
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - red-ci

networks:
  red-ci:
    driver: bridge

volumes:
  jenkins_home: